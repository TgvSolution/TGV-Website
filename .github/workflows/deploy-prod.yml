name: Deploy — Production (Azure)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Ne pas annuler un déploiement prod en cours

jobs:
  # ── Étape 1 : CI complet obligatoire avant de demander l'approbation ──────
  ci-check:
    name: CI Gate (required before approval)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint . --ext .ts,.js --max-warnings 0
      - run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
      - run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb

  # ── Étape 2 : Déploiement avec approbation manuelle ──────────────────────
  deploy-production:
    name: Deploy to Azure App Service (Production)
    runs-on: ubuntu-latest
    needs: ci-check
    environment: production   # Environnement GitHub avec "Required reviewers" configuré

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build
        run: npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Déploiement avec slot swap (zéro downtime)
      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_PROD }}
          slot-name: staging
          package: .

      - name: Health check on staging slot
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PROD_SLOT_URL }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Staging slot health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Staging slot healthy — proceeding with swap"

      - name: Swap slots (staging → production)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --name ${{ secrets.AZURE_WEBAPP_NAME_PROD }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --slot staging \
              --target-slot production

      - name: Health check on production
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PROD_URL }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Production health check failed — HTTP $STATUS"
            echo "Consider swapping back manually"
            exit 1
          fi
          echo "✅ Production is healthy (HTTP $STATUS)"

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "release-$(date +%Y%m%d-%H%M%S)" -m "Production deployment ${{ github.sha }}"
          git push origin --tags

# Secrets requis dans l'environnement GitHub "production" :
# AZURE_CREDENTIALS          → Service principal JSON
# AZURE_WEBAPP_NAME_PROD     → Nom de l'App Service production
# AZURE_RESOURCE_GROUP       → Resource group Azure
# PROD_SLOT_URL              → URL du slot staging avant swap
# PROD_URL                   → URL de production finale
#
# Configurer dans : GitHub repo → Settings → Environments → production
# → Ajouter "Required reviewers" pour l'approbation manuelle
# → Optionnel : "Wait timer" de 5 min comme filet de sécurité
