kind = "web"
previewPath = "/"
title = "Solution TGV — Website"
version = "1.0.0"
id = "artifacts/tgv-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21122

[services.development]
run = "pnpm --filter @workspace/tgv-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tgv-website", "run", "build" ]
publicDir = "artifacts/tgv-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21122"
BASE_PATH = "/"
